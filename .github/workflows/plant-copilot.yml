---
name: Plant Copilot

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
#
# Builds and publishes the Plant Copilot MCP server container image to GitHub
# Container Registry (GHCR). The image is referenced by the ARM deployment
# template (Deployment/arm.json) as the Plant Copilot Azure Container App.

on:
  schedule:
    - cron: "23 9 * * *"
  push:
    branches: [main, develop]
    # Publish semver tags as releases.
    tags: ["v*.*.*"]
  pull_request:
    branches: [ main ]
  merge_group:

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # Publish as a sub-image of the repository, e.g.
  # ghcr.io/digitaltwinconsortium/manufacturingontologies/plantcopilot
  IMAGE_NAME: ${{ github.repository }}/plantcopilot

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.7.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        uses: docker/build-push-action@v6.19.2
        with:
          context: ./Tools/PlantCopilot/
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
